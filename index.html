async function dbRead(path) {
  try {
    const snap = await get(ref(db, path));
    return snap.exists() ? snap.val() : null;
  } catch(e) { return null; }
}
async function dbWrite(path, data) {
  try { await set(ref(db, path), data); return true; }
  catch(e) { return false; }
}
async function dbMerge(path, data) {
  try { await update(ref(db, path), data); return true; }
  catch(e) { return false; }
}

async function doLogin() {
  const user = document.getElementById("loginUser").value.trim().toLowerCase();
  const pass = document.getElementById("loginPass").value.trim();
  document.getElementById("loginError").style.display = "none";

  const btnEntrar = document.querySelector("#loginScreen .btn-primary");
  if (btnEntrar) { btnEntrar.textContent = "Entrando..."; btnEntrar.disabled = true; }

  try {
    // Timeout de 5 segundos para o Firebase
    const profsPromise = dbRead("professores");
    const timeoutPromise = new Promise(resolve => setTimeout(() => resolve(null), 5000));
    const profs = await Promise.race([profsPromise, timeoutPromise]);

    if (!profs) {
      demoLogin(user, pass);
    } else {
      dbProfessores = profs;
      const prof = profs[user];
      if (prof && prof.senha === pass) {
        currentUser = { id: user, ...prof };
        afterLogin();
      } else {
        document.getElementById("loginError").style.display = "block";
      }
    }
  } catch(e) {
    // Fallback para demo se Firebase falhar
    demoLogin(user, pass);
  } finally {
    if (btnEntrar) { btnEntrar.textContent = "Entrar"; btnEntrar.disabled = false; }
  }
}

// ══════════════════════════════════════════════════════
// LISTA DE TRABALHOS
// ══════════════════════════════════════════════════════
async function loadWorkList() {
  document.getElementById("profName").textContent = "Olá, " + currentUser.nome.replace("Prof. ","");

  // Buscar atribuições do Firebase
  const atrib = await dbRead("atribuicoes") || dbAtribuicoes;
  dbAtribuicoes = atrib;

  // Quais trabalhos estão atribuídos a este professor?
  const meusTrabalhos = [];
  Object.entries(atrib).forEach(([tid, a]) => {
    if (a.av1 === currentUser.id || a.av2 === currentUser.id) {
      meusTrabalhos.push(tid);
    }
  });

  // Se não há atribuições, usar lista local (demo)
  const lista = meusTrabalhos.length > 0 ? meusTrabalhos : (currentUser.trabalhos || []);
  document.getElementById("profSub").textContent = lista.length + " trabalho(s) designado(s).";

  const trab = await dbRead("trabalhos") || dbTrabalhos;
  dbTrabalhos = trab;
  const alunos = await dbRead("alunos") || dbAlunos;
  dbAlunos = alunos;

  const container = document.getElementById("workCards");
  container.innerHTML = "";

  if (lista.length === 0) {
    container.innerHTML = `<div class="loading">Nenhum trabalho atribuído ainda. Aguarde o coordenador.</div>`;
    return;
  }

  for (const tid of lista) {
    const w = trab[tid];
    if (!w) continue;
    // Checar Firebase primeiro, fallback para localEvals (modo sem Firebase)
    const evFirebase = await dbRead(`avaliacoes/${tid}/${currentUser.id}`);
    const evLocal    = localEvals[tid] || {};
    const ev = evFirebase || evLocal;
    // Sincronizar localEvals com o que veio do Firebase
    if (evFirebase) localEvals[tid] = evFirebase;
    const done = ev.saved === true;
    const nota = done ? calcTotalFromEv(ev).toFixed(1) : null;

    const card = document.createElement("div");
    card.className = "work-card" + (done ? " done" : "");
    card.onclick = () => openWork(tid);
    card.innerHTML = `
      <div class="work-card-info">
        <h3>${w.titulo || tid}</h3>
        <p>${w.codigo || tid} · Avaliação cega</p>
      </div>
      <span class="badge ${done ? 'badge-done' : 'badge-pending'}">
        ${done ? "✓ " + nota + "/10" : "Pendente"}
      </span>`;
    container.appendChild(card);
  }
}

// ABRIR TRABALHO

async function openWork(tid) {
  // ── Limpar estado do trabalho anterior ──
  currentWork = tid;

  // Limpar campos fixos que não são reconstruídos por buildCampos()
  const gcEl = document.getElementById("generalComment");
  const anEl = document.getElementById("ajusteNota");
  const ajEl = document.getElementById("ajusteJustif");
  if (gcEl) gcEl.value = "";
  if (anEl) anEl.value = "";
  if (ajEl) ajEl.value = "";

  const w = dbTrabalhos[tid] || {};
  document.getElementById("workTitle").textContent = w.titulo || tid;
  document.getElementById("workCode").textContent = (w.codigo || tid) + " · Avaliação cega";

  // PDF
  if (w.pdf) {
    document.getElementById("pdfFrame").src = w.pdf;
    document.getElementById("pdfFrame").classList.remove("collapsed");
    document.querySelector(".pdf-toggle").textContent = "Recolher";
  } else {
    document.getElementById("pdfFrame").srcdoc =
      `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:sans-serif;color:#999;flex-direction:column;gap:8px">
        <div style="font-size:2rem">📄</div>
        <div style="text-align:center">PDF não disponível neste ambiente de demonstração.<br>Em produção, o arquivo é carregado automaticamente.</div>
      </div>`;
  }

  // Reconstruir campos do DOM (limpa seleções anteriores)
  buildCampos();

  // Carregar avaliação salva — Firebase primeiro, fallback local
  const evFirebase = await dbRead(`avaliacoes/${tid}/${currentUser.id}`);
  const ev = evFirebase || localEvals[tid] || {};
  localEvals[tid] = ev;

  // Restaurar somente se há dados — campos já estão limpos
  restoreEval(ev);
  updateScore();
  buildScoreSummary();

  document.getElementById("scorePill").style.display = "flex";
  document.getElementById("headerSub").textContent = (w.titulo || tid) + " · Avaliação em andamento";
  showScreen("evalScreen");
}

// ══════════════════════════════════════════════════════
// CONSTRUIR CAMPOS
// ══════════════════════════════════════════════════════
function buildCampos() {
  const container = document.getElementById("camposContainer");
  container.innerHTML = "";
  CAMPOS.forEach(campo => {
    const card = document.createElement("div");
    card.className = "campo-card";
    card.innerHTML = `
      <div class="campo-header">
        <div><span class="campo-num">${campo.num}</span><span class="campo-title">${campo.titulo}</span></div>
        <span class="campo-score-badge" id="badge-${campo.id}">—</span>
      </div>
      <div class="campo-body" id="body-${campo.id}"></div>`;
    container.appendChild(card);

    const body = card.querySelector(`#body-${campo.id}`);
    campo.criterios.forEach(crit => {
      const block = document.createElement("div");
      block.className = "criterio-block";
      const orientHtml = crit.atencao
        ? `<div class="orientacao">${crit.orientacao}<br><br><span class="atencao">⚠ Atenção: ${crit.atencao}</span></div>`
        : `<div class="orientacao">${crit.orientacao}</div>`;
      block.innerHTML = `
        <div class="criterio-label">
          ${crit.nome}
          ${crit.critico ? '<span class="critico-tag">Critério crítico</span>' : ''}
        </div>
        ${orientHtml}
        <div class="nivel-selector" data-campo="${campo.id}" data-criterio="${crit.id}"></div>
        <div class="comment-area" id="ca-${campo.id}-${crit.id}">
          <label>⚠ Comentário obrigatório — nota abaixo de 7</label>
          <textarea data-campo="${campo.id}" data-criterio="${crit.id}"
            placeholder="Indique o que está ausente ou inadequado neste critério..."></textarea>
        </div>`;
      body.appendChild(block);
      buildNivelSelector(block.querySelector(".nivel-selector"), campo.id, crit.id);
    });
  });

  buildNivelSelector(
    document.querySelector('[data-campo="transversal"][data-criterio="org"].nivel-selector'),
    "transversal","org"
  );
}

function buildNivelSelector(container, campoId, critId) {
  if (!container) return;
  container.innerHTML = "";
  NIVEIS.forEach(n => {
    const btn = document.createElement("div");
    btn.className = "nivel-btn";
    btn.dataset.nivel = n.nivel;
    btn.dataset.campo = campoId;
    btn.dataset.criterio = critId;
    btn.innerHTML = `<div class="nivel-name">${n.nome}</div><div class="nivel-pts">${n.pts.toFixed(2)}</div>`;
    btn.onclick = () => selectNivel(campoId, critId, n.nivel, n.pts);
    container.appendChild(btn);
  });
}

// ══════════════════════════════════════════════════════
// SELECIONAR NÍVEL
// ══════════════════════════════════════════════════════
function selectNivel(campoId, critId, nivel, pts) {
  if (!localEvals[currentWork]) localEvals[currentWork] = {};
  if (!localEvals[currentWork][campoId]) localEvals[currentWork][campoId] = {};
  localEvals[currentWork][campoId][critId] = { nivel, pts };

  document.querySelectorAll(`.nivel-btn[data-campo="${campoId}"][data-criterio="${critId}"]`)
    .forEach(b => b.classList.toggle("selected", parseInt(b.dataset.nivel) === nivel));

  updateCampoScore(campoId);
  updateScore();
  buildScoreSummary();
}

function updateCampoScore(campoId) {
  const campoEv = (localEvals[currentWork] || {})[campoId] || {};
  const campo = CAMPOS.find(c => c.id === campoId);
  const criterios = campoId === "transversal" ? [{id:"org"}] : campo?.criterios || [];

  let total = 0, count = 0;
  criterios.forEach(c => {
    if (campoEv[c.id] !== undefined) { total += campoEv[c.id].pts; count++; }
  });
  const nota = count === 0 ? null : (total / (criterios.length * 2.5)) * 10;

  const badge = document.getElementById("badge-" + campoId);
  if (badge) {
    badge.textContent = nota === null ? "—" : nota.toFixed(1) + "/10";
    badge.className = "campo-score-badge" + (nota === null ? "" : nota < 7 ? " low" : " scored");
  }

  criterios.forEach(c => {
    const critEv = campoEv[c.id];
    const caEl = document.getElementById(`ca-${campoId}-${c.id}`);
    if (caEl && critEv !== undefined) {
      const n = (critEv.pts / 2.5) * 10;
      caEl.classList.toggle("visible", n < 7);
    }
  });
}

// CALCULAR TOTAL
// ══════════════════════════════════════════════════════
function calcTotalFromEv(ev) {
  let pts = 0, max = 0;
  CAMPOS.forEach(campo => {
    campo.criterios.forEach(c => {
      max += 2.5;
      const v = (ev[campo.id] || {})[c.id];
      if (v !== undefined) pts += v.pts;
    });
  });
  max += 2.5;
  if ((ev.transversal || {}).org !== undefined) pts += ev.transversal.org.pts;
  if (max === 0) return 0;
  const ajuste = parseFloat(ev.ajusteNota);
  if (!isNaN(ajuste) && ajuste >= 0 && ajuste <= 10) return ajuste;
  return Math.round((pts/max)*100)/10;
}

function updateScore() {
  const ev = localEvals[currentWork] || {};
  // ajuste manual
  const aj = parseFloat(document.getElementById("ajusteNota")?.value);
  const total = !isNaN(aj) && aj >= 0 && aj <= 10 ? aj : calcTotalFromEv(ev);
  const el = document.getElementById("scoreVal");
  if (el) el.textContent = total > 0 ? total.toFixed(1) : "—";
}

function buildScoreSummary() {
  const ev = localEvals[currentWork] || {};
  const container = document.getElementById("scoreSummary");
  if (!container) return;
  container.innerHTML = "";

  [...CAMPOS.map(c=>({id:c.id,label:c.num.replace("Campo ","C"),criterios:c.criterios})),
   {id:"transversal",label:"Org.",criterios:[{id:"org"}]}
  ].forEach(f => {
    const campoEv = ev[f.id] || {};
    let total=0,count=0;
    f.criterios.forEach(c => { if(campoEv[c.id]!==undefined){total+=campoEv[c.id].pts;count++;} });
    const nota = count===0 ? null : (total/(f.criterios.length*2.5))*10;
    const item = document.createElement("div");
    item.className = "score-item";
    item.innerHTML = `
      <div class="s-label">${f.label}</div>
      <div class="s-val" style="color:${nota===null?'#ccc':nota<7?'var(--danger)':'var(--accent)'}">
        ${nota===null?"—":nota.toFixed(1)}
      </div>`;
    container.appendChild(item);
  });

  const totalItem = document.createElement("div");
  totalItem.className = "score-item total";
  const t = calcTotalFromEv(ev);
  totalItem.innerHTML = `<div class="s-label">TOTAL</div><div class="s-val">${t>0?t.toFixed(1):"—"}</div>`;
  container.appendChild(totalItem);
}

function restoreEval(ev) {
  // Sempre limpar todas as seleções antes de restaurar
  document.querySelectorAll(".nivel-btn").forEach(b => b.classList.remove("selected"));
  document.querySelectorAll(".comment-area").forEach(ca => ca.classList.remove("visible"));
  document.querySelectorAll("textarea[data-campo]").forEach(ta => ta.value = "");

  // Restaurar apenas se há dados salvos
  CAMPOS.forEach(campo => {
    campo.criterios.forEach(c => {
      const v = (ev[campo.id]||{})[c.id];
      if (v !== undefined) {
        document.querySelectorAll(`.nivel-btn[data-campo="${campo.id}"][data-criterio="${c.id}"]`)
          .forEach(b => b.classList.toggle("selected", parseInt(b.dataset.nivel) === v.nivel));
        updateCampoScore(campo.id);
      }
    });
  });
  if ((ev.transversal||{}).org !== undefined) {
    document.querySelectorAll(`.nivel-btn[data-campo="transversal"][data-criterio="org"]`)
      .forEach(b => b.classList.toggle("selected", parseInt(b.dataset.nivel) === ev.transversal.org.nivel));
    updateCampoScore("transversal");
  }
  document.querySelectorAll("textarea[data-campo]").forEach(ta => {
    const k = `${ta.dataset.campo}_${ta.dataset.criterio}_comment`;
    if (ev[k]) ta.value = ev[k];
  });
  // Campos fixos — só preencher se existirem no ev
  const gcEl = document.getElementById("generalComment");
  const anEl = document.getElementById("ajusteNota");
  const ajEl = document.getElementById("ajusteJustif");
  if (gcEl) gcEl.value = ev.generalComment || "";
  if (anEl) anEl.value = ev.ajusteNota || "";
  if (ajEl) ajEl.value = ev.ajusteJustif || "";
}

function collectEval() {
  if (!localEvals[currentWork]) localEvals[currentWork] = {};
  const ev = localEvals[currentWork];
  document.querySelectorAll("textarea[data-campo]").forEach(ta => {
    ev[`${ta.dataset.campo}_${ta.dataset.criterio}_comment`] = ta.value;
  });
  ev.generalComment = document.getElementById("generalComment")?.value || "";
  ev.ajusteNota = document.getElementById("ajusteNota")?.value || "";
  ev.ajusteJustif = document.getElementById("ajusteJustif")?.value || "";
  ev.timestamp = Date.now();
}

async function saveEval() {
  collectEval();
  if (!localEvals[currentWork]) localEvals[currentWork] = {};
  localEvals[currentWork].saved = true;
  localEvals[currentWork].savedAt = new Date().toISOString();
  const ok = await dbWrite(`avaliacoes/${currentWork}/${currentUser.id}`, localEvals[currentWork]);
  showToast(ok ? "✅ Avaliação salva!" : "✅ Avaliação salva localmente!");
  setTimeout(() => goBack(), 1000);
}

function saveEvalSilent() {
  collectEval();
  if (currentWork && window._firebaseReady) {
    dbWrite(`avaliacoes/${currentWork}/${currentUser.id}`, localEvals[currentWork]);
  }
}

function clearEval() {
  if (!confirm("Deseja limpar toda a avaliação deste trabalho?")) return;
  localEvals[currentWork] = {};
  buildCampos();
  document.getElementById("generalComment").value = "";
  document.getElementById("ajusteNota").value = "";
  document.getElementById("ajusteJustif").value = "";
  buildScoreSummary();
  updateScore();
}

function handleAlunosCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const lines = e.target.result.trim().split("
").filter(l=>l.trim());
    const alunos = {};
    let count = 0, matutino = 0, noturno = 0;
    lines.forEach((line, i) => {
      if (i===0 && line.toLowerCase().includes("nome")) return;
      const parts = line.split(",").map(s=>s.trim());
      if (parts.length < 2) return;
      const id = "A" + String(i).padStart(3,"0");
      const turma = parts[2] || "Não informada";
      alunos[id] = { nome:parts[0], email:parts[1], turma, codigo:"TFG-"+String(i).padStart(3,"0") };
      if (turma.toLowerCase().includes("matutino")) matutino++;
      else if (turma.toLowerCase().includes("noturno")) noturno++;
      count++;
    });
    dbAlunos = alunos;
    const ok = await dbWrite("alunos", alunos);
    const st = document.getElementById("statusAlunos");
    st.className = "upload-status ok";
    st.textContent = `✓ ${count} aluno(s) · Matutino: ${matutino} · Noturno: ${noturno}${ok?" · Firebase ok":" · Firebase não configurado"}`;
  };
  reader.readAsText(file);
}

function gerarSenha(nome, email) {
  // TFG + 4 letras do sobrenome + ano
  const sobrenome = nome.trim().split(" ").slice(-1)[0].replace(/[^a-zA-Z]/g,"").slice(0,4);
  const ano = new Date().getFullYear();
  return "TFG" + sobrenome.charAt(0).toUpperCase() + sobrenome.slice(1).toLowerCase() + ano;
}

function handleProfsCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const lines = e.target.result.trim().split("\n").filter(l=>l.trim());
    const profs = {};
    profs["coordenador"] = { nome:"Coordenador", email:"", senha:"coord2026", isCoord:true, trabalhos:[] };
    let count = 0;
    const gerados = [];
    lines.forEach((line, i) => {
      if (i===0 && line.toLowerCase().includes("nome")) return;
      const parts = line.split(",").map(s=>s.trim());
      if (parts.length < 2) return;
      const userId = parts[1].split("@")[0].toLowerCase().replace(/[^a-z0-9.]/g,".");
      const senha = gerarSenha(parts[0], parts[1]);
      profs[userId] = { nome:parts[0], email:parts[1], senha, isCoord:false, trabalhos:[], credEnviado:false };
      gerados.push({ userId, nome:parts[0], email:parts[1], senha });

    const wrap = document.getElementById("profsGeradosWrap");
    const tbl = document.getElementById("profsGeradosTable");
    wrap.style.display = "block";
    tbl.innerHTML = `

            <th style="background:var(--surface2);padding:6px 10px;text-align:left;border-bottom:2px solid var(--border);font-size:0.68rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted)">Senha Gerada</th>
            <th style="background:var(--surface2);padding:6px 10px;text-align:left;border-bottom:2px solid var(--border);font-size:0.68rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted)">E-mail</th>
          </tr>

              <td style="padding:6px 10px;border-bottom:1px solid var(--border);color:var(--muted)">${g.email}</td>
            </tr>`).join("")}
        </tbody>
      </table>`;

    const st = document.getElementById("statusProfs");
    st.className = "upload-status ok";
    st.textContent = `✓ ${count} professor(es) carregado(s) · senhas geradas automaticamente${ok?" e salvo(s) no Firebase":" (Firebase não configurado)"}`;
  };
  reader.readAsText(file);
}

async function enviarCredenciaisProfessores() {
  const { service: EMAILJS_SERVICE, templateProf: EMAILJS_TEMPLATE, key: EMAILJS_KEY } = getEmailJSConfig();
  const SISTEMA_URL      = window.location.href;

  const profs = Object.entries(dbProfessores).filter(([,p])=>!p.isCoord);
  if (profs.length === 0) { showToast("⚠️ Nenhum professor carregado."); return; }

  if (EMAILJS_SERVICE === "SEU_SERVICE_ID") {
    // Modo sem EmailJS: copiar para área de transferência
    const linhas = profs.map(([id,p])=>
      `Para: ${p.email}\nNome: ${p.nome}\nUsuário: ${id}\nSenha: ${p.senha}\nLink: ${SISTEMA_URL}\n`
    ).join("\n---\n\n");
    try {
      await navigator.clipboard.writeText(linhas);
      showToast("📋 Credenciais copiadas! Cole no seu e-mail e envie manualmente.");
    } catch {
      alert("Credenciais para envio manual:\n\n" + linhas);
    }
    return;
  }

  // Com EmailJS configurado
  if (!window.emailjs) { showToast("⚠️ EmailJS não carregado."); return; }
  emailjs.init(EMAILJS_KEY);
  let enviados = 0;
  for (const [id, p] of profs) {
    try {
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_name: p.nome, to_email: p.email,
        usuario: id, senha: p.senha, link: SISTEMA_URL
      });
      enviados++;
    } catch(err) { console.error("Erro ao enviar para", p.email, err); }
  }
  showToast(`✅ Credenciais enviadas para ${enviados} professor(es)!`);
  await dbMerge("professores", Object.fromEntries(profs.map(([id,p])=>[id,{...p,credEnviado:true}])));
}

async function loadAtribTable() {
  const alunos = await dbRead("alunos") || dbAlunos;
  const profs = await dbRead("professores") || dbProfessores;
  const atrib = await dbRead("atribuicoes") || dbAtribuicoes;
  dbAlunos = alunos; dbProfessores = profs; dbAtribuicoes = atrib;

  const tbody = document.getElementById("atribBody");
  tbody.innerHTML = "";

  const alunoIds = Object.keys(alunos);
  if (alunoIds.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1.5rem">Carregue a lista de alunos primeiro.</td></tr>`;
    return;
  }

  const profOptions = Object.entries(profs)
    .filter(([,p]) => !p.isCoord)
    .map(([id,p]) => `<option value="${id}">${p.nome}</option>`)
    .join("");

  alunoIds.forEach(aid => {
    const a = alunos[aid];
    const tid = "T" + aid.slice(1);
    const at = atrib[tid] || {};
    const turmaStr = String(a.turma || "1");
    const tr = document.createElement("tr");
    tr.dataset.turma = turmaStr;
    tr.innerHTML = `
      <td><strong>${a.nome}</strong><br><small style="color:var(--muted)">${a.email}</small></td>
      <td><span style="font-size:0.75rem;background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:600">${a.turmaLabel || "Turma "+turmaStr}</span></td>
      <td>${a.codigo}</td>
      <td>
        <select class="select-prof" id="av1-${tid}">
          <option value="">— selecionar —</option>${profOptions}
        </select>
      </td>
      <td>
        <select class="select-prof" id="av2-${tid}">
          <option value="">— selecionar —</option>${profOptions}
        </select>
      </td>`;
    tbody.appendChild(tr);
    if (at.av1) document.getElementById(`av1-${tid}`).value = at.av1;
    if (at.av2) document.getElementById(`av2-${tid}`).value = at.av2;
  });
}

async function salvarAtribuicoes() {
  const alunos = dbAlunos;
  const atrib = {};
  Object.keys(alunos).forEach(aid => {

}

let _resultFiltro = "todas";

function filtrarResultados(turma) {
  _resultFiltro = turma;
  document.querySelectorAll(".result-card").forEach(card => {
    const t = card.dataset.turma || "";
    card.style.display = (turma === "todas" || t === turma) ? "" : "none";
  });

async function loadResultados() {
  const grid = document.getElementById("resultsGrid");
  grid.innerHTML = `<div class="loading">Carregando...</div>`;

  const alunos     = await dbRead("alunos")      || dbAlunos;
  const atrib      = await dbRead("atribuicoes")  || dbAtribuicoes;
  const avaliacoes = await dbRead("avaliacoes")   || {};

  grid.innerHTML = "";

  const alunoIds = Object.keys(alunos);
  if (alunoIds.length === 0) {
    grid.innerHTML = `<div class="loading">Nenhum dado disponível ainda.</div>`;
    return;
  }

  // Agrupar por turma
  const turmas = ["Matutino", "Noturno", "Sem turma"];
  turmas.forEach(turmaAtual => {
    const alunosDaTurma = alunoIds.filter(aid => {
      const t = alunos[aid].turma || "Sem turma";
      return t === turmaAtual;
    });
    if (alunosDaTurma.length === 0) return;

    const turmaColor = turmaAtual === "Matutino" ? "#c9a84c" : turmaAtual === "Noturno" ? "#3a5bbf" : "#999";
    const turmaIcon  = turmaAtual === "Matutino" ? "☀️" : turmaAtual === "Noturno" ? "🌙" : "📋";

    // Cabeçalho da turma
    const header = document.createElement("div");
    header.style.cssText = `font-weight:700;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;color:${turmaColor};padding:0.5rem 0 0.25rem;margin-top:0.5rem;border-bottom:2px solid ${turmaColor}22;margin-bottom:0.5rem`;
    header.textContent = `${turmaIcon} Turma ${turmaAtual}`;
    header.dataset.turmaHeader = turmaAtual;
    grid.appendChild(header);

    alunosDaTurma.forEach(aid => {
      const a   = alunos[aid];
      const tid = "T" + aid.slice(1);
      const at  = atrib[tid] || {};
      const ev1 = at.av1 ? (avaliacoes[tid]||{})[at.av1] : null;
      const ev2 = at.av2 ? (avaliacoes[tid]||{})[at.av2] : null;
      const n1  = ev1 ? calcTotalFromEv(ev1) : null;
      const n2  = ev2 ? calcTotalFromEv(ev2) : null;
      const media = (n1!==null && n2!==null) ? ((n1+n2)/2) : null;

      const card = document.createElement("div");
      card.className = "result-card";
      card.dataset.turma = turmaAtual;
      card.style.display = (_resultFiltro === "todas" || _resultFiltro === turmaAtual) ? "" : "none";
      card.innerHTML = `
        <h4>
          ${a.nome}
          <small style="color:var(--muted);font-weight:400"> — ${a.codigo}</small>
          <span style="font-size:0.68rem;font-weight:600;color:${turmaColor};margin-left:6px">${turmaIcon} ${turmaAtual}</span>
        </h4>
        <div class="result-scores">
          <div class="result-score">
            <span class="rs-label">Avaliador 1: </span>
            <span class="rs-val ${n1!==null&&n1<7?'low':''}">${n1!==null?n1.toFixed(1):"Pendente"}</span>
          </div>
          <div class="result-score">
            <span class="rs-label">Avaliador 2: </span>
            <span class="rs-val ${n2!==null&&n2<7?'low':''}">${n2!==null?n2.toFixed(1):"Pendente"}</span>
          </div>
        </div>
        <div>
          <span style="font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em">Média Final: </span>
          <span class="result-avg ${media!==null&&media<7?'low':''}">${media!==null?media.toFixed(1):"—"}</span>
        </div>`;
      grid.appendChild(card);
    });
  });

  // Atualizar cabeçalhos de turma quando filtrar
  document.querySelectorAll("[data-turma-header]").forEach(h => {
    const t = h.dataset.turmaHeader;
    h.style.display = (_resultFiltro === "todas" || _resultFiltro === t) ? "" : "none";
  });
}

async function exportarResultados() {
  const alunos    = await dbRead("alunos")     || dbAlunos;
  const atrib     = await dbRead("atribuicoes") || dbAtribuicoes;
  const avaliacoes= await dbRead("avaliacoes")  || {};
  const filtro    = document.getElementById("filtroResultTurma")?.value || "Todas";

  const rows = ["Nome,Email,Turma,Codigo,Avaliador1,Avaliador2,Media"];
  Object.entries(alunos).forEach(([aid, a]) => {
    if (filtro !== "Todas" && a.turma !== filtro) return;
    const tid = "T" + aid.slice(1);
    const at  = atrib[tid] || {};
    const ev1 = at.av1 ? (avaliacoes[tid]||{})[at.av1] : null;
    const ev2 = at.av2 ? (avaliacoes[tid]||{})[at.av2] : null;
    const n1  = ev1 ? calcTotalFromEv(ev1).toFixed(1) : "Pendente";
    const n2  = ev2 ? calcTotalFromEv(ev2).toFixed(1) : "Pendente";
    const media = (ev1 && ev2) ? ((calcTotalFromEv(ev1)+calcTotalFromEv(ev2))/2).toFixed(1) : "—";
    rows.push(`"${a.nome}","${a.email}","${a.turma||""}","${a.codigo}",${n1},${n2},${media}`);
  });

  const blob = new Blob([rows.join("\n")], { type:"text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const turmaLabel = filtro === "Todas" ? "todas-turmas" : filtro.toLowerCase();
  link.href = url;
  link.download = `resultados-tfg-${turmaLabel}-${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(url);
  showToast("✅ CSV exportado!");
}

function montarFichaAluno(ev, titulo) {
  if (!ev) return titulo + "\nAvaliação pendente.\n";
  let ficha = titulo + "\n" + "=".repeat(40) + "\n";
  CAMPOS.forEach(campo => {
    const campoEv = ev[campo.id] || {};
    let pts = 0, count = 0, comps = [];
    campo.criterios.forEach(c => {
      const v = campoEv[c.id];
      if (v !== undefined) { pts += v.pts; count++; }
      const ck = campo.id + "_" + c.id + "_comment";
      if (ev[ck]) comps.push("  " + c.nome + ": " + ev[ck]);
    });
    const nota = count > 0 ? ((pts/(campo.criterios.length*2.5))*10).toFixed(1) : "—";
    ficha += "\n" + campo.num + " — " + campo.titulo + ": " + nota + "/10\n";
    if (comps.length) ficha += comps.join("\n") + "\n";
  });
  const tEv = (ev.transversal||{}).org;
  if (tEv) {
    ficha += "\nOrganização Geral: " + ((tEv.pts/2.5)*10).toFixed(1) + "/10\n";
    const tc = ev["transversal_org_comment"];
    if (tc) ficha += "  " + tc + "\n";
  }
  if (ev.generalComment) ficha += "\nComentário Geral:\n" + ev.generalComment + "\n";
  if (ev.ajusteNota) ficha += "\nNota ajustada: " + ev.ajusteNota + "\n";
  return ficha;
}

async function liberarResultados() {
  const { service: EMAILJS_SERVICE, templateAluno: EMAILJS_TEMPLATE, key: EMAILJS_KEY } = getEmailJSConfig();
  const SISTEMA_URL      = window.location.href;

  const alunos    = await dbRead("alunos")     || dbAlunos;
  const atrib     = await dbRead("atribuicoes") || dbAtribuicoes;
  const avaliacoes= await dbRead("avaliacoes")  || {};
  const profs     = await dbRead("professores") || dbProfessores;

  const statusEl = document.getElementById("liberarStatus");
  statusEl.style.display = "block";
  statusEl.style.background = "var(--warn-light)";
  statusEl.style.color = "var(--warn)";
  statusEl.textContent = "Preparando resultados...";

  const resultados = [];
  Object.entries(alunos).forEach(([aid, a]) => {
    const tid = "T" + aid.slice(1);
    const at  = atrib[tid] || {};
    const ev1 = at.av1 ? (avaliacoes[tid]||{})[at.av1] : null;
    const ev2 = at.av2 ? (avaliacoes[tid]||{})[at.av2] : null;
    const n1  = ev1 ? calcTotalFromEv(ev1) : null;
    const n2  = ev2 ? calcTotalFromEv(ev2) : null;
    const media = (n1!==null && n2!==null) ? ((n1+n2)/2) : null;

    // Montar comentários das fichas
    const comentarios = [];
    if (ev1?.generalComment) comentarios.push("Avaliador 1: " + ev1.generalComment);
    if (ev2?.generalComment) comentarios.push("Avaliador 2: " + ev2.generalComment);

    resultados.push({
      nome: a.nome, email: a.email, codigo: a.codigo,
      n1: n1?.toFixed(1) ?? "Pendente",
      n2: n2?.toFixed(1) ?? "Pendente",
      media: media?.toFixed(1) ?? "Aguardando ambas as avaliações",
      comentarios: comentarios.join("\n\n") || "Nenhum comentário geral registrado.",
      pronto: media !== null
    });
  });

  const prontos   = resultados.filter(r=>r.pronto);
  const pendentes = resultados.filter(r=>!r.pronto);

  if (EMAILJS_SERVICE === "SEU_SERVICE_ID") {
    // Modo sem EmailJS: resumo para envio manual
    const resumo = resultados.map(r =>
      `${r.nome} [${r.turma}] (${r.email})\n  Nota Final: ${r.media}\n\n${r.fichaCompleta}`
    ).join("\n\n" + "=".repeat(60) + "\n\n");
    try {
      await navigator.clipboard.writeText(
        `${prontos.length} resultado(s) prontos\n` +
        (pendentes.length ? `Pendentes: ${pendentes.map(r=>r.nome).join(", ")}\n` : "") +
        "\n" + resumo
      );
      showToast("📋 Resultados copiados! Cole no seu e-mail e envie manualmente.");
    } catch {
      alert(`${prontos.length} resultado(s) prontos.\n\n` + resumo);
    }
    statusEl.style.background = "var(--ok-light)";
    statusEl.style.color = "var(--ok)";
    statusEl.textContent = `✓ ${prontos.length} resultado(s) prontos · ${pendentes.length} pendente(s) · EmailJS não configurado — envio manual necessário`;
    return;
  }

  // Com EmailJS configurado
  if (!window.emailjs) { showToast("⚠️ EmailJS não carregado."); return; }
  emailjs.init(EMAILJS_KEY);
  let enviados = 0;
  for (const r of prontos) {
    try {
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_name: r.nome, to_email: r.email,
        codigo: r.codigo, turma: r.turma,
        nota_final: r.media, avaliador1: r.n1, avaliador2: r.n2,
        ficha_completa: r.fichaCompleta, link: SISTEMA_URL
      });
      enviados++;
    } catch(err) { console.error("Erro ao enviar para", r.email, err); }
  }
  statusEl.style.background = "var(--ok-light)";
  statusEl.style.color = "var(--ok)";
  statusEl.textContent = `✅ Resultados enviados para ${enviados} aluno(s).${pendentes.length?" "+pendentes.length+" ainda pendente(s).":""}`;
  showToast(`✅ ${enviados} resultado(s) enviado(s)!`);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3200);
}
// ── INIT ──
// Init robusto — funciona com scripts tipo module
function initApp() {
  ["loginScreen","workListScreen","evalScreen","coordScreen"].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove("active"); el.style.display = "none"; }
  });
  const login = document.getElementById("loginScreen");
  if (login) {
    login.classList.add("active");
    login.style.display = "flex";
  }
  const u = document.getElementById("loginUser");
  if (u) u.focus();
}

// Tentar DOMContentLoaded primeiro, fallback para window.onload
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initApp);
} else {
  initApp();
}
window.addEventListener("load", function() {
  const login = document.getElementById("loginScreen");
  if (login && login.style.display !== "flex") {
    initApp();
  }
});
